services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: ticketflow-api
    runtime: node
    rootDir: booking-api-backend/booking
    buildCommand: npm install && npm run build && npm run db:migrate
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: API_URL
        sync: false          # Set to your Render API URL e.g. https://ticketflow-api.onrender.com
      - key: FRONTEND_URL
        sync: false          # Set to your Render frontend URL e.g. https://ticketflow-web.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: MOCK_PAYMENT
        value: "true"        # Change to false once Razorpay is approved
      - key: RAZORPAY_KEY_ID
        value: mock
      - key: RAZORPAY_KEY_SECRET
        value: mock
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET_NAME
        value: ticketflow
      - key: RESEND_API_KEY
        sync: false
      - key: MEILISEARCH_URL
        sync: false
      - key: MEILISEARCH_API_KEY
        sync: false

  # ── Frontend Web ───────────────────────────────────────────────────────────
  - type: web
    name: ticketflow-web
    runtime: static
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to https://ticketflow-api.onrender.com/api/v1
      - key: VITE_RAZORPAY_KEY_ID
        value: mock
